name: Publish Docker images

on:
  push:
    branches: [ main, master ]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ai_service image
        uses: docker/build-push-action@v5
        with:
          context: ./ai_service
          file: ./ai_service/Dockerfile.tf
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/aq-immune-ai:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/web
          file: ./frontend/web/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/aq-immune-frontend:latest
