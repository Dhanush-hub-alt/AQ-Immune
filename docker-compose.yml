version: '3.8'
services:
  ai_service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile.tf
    image: aq-immune-ai:latest
    ports:
      - "5000:5000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile
    image: aq-immune-frontend:latest
    ports:
      - "3000:80"
    depends_on:
      - ai_service
    restart: unless-stopped
